name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-cov httpx pynvml
          pip install fastapi uvicorn pydantic peewee pyyaml javalang lizard websockets
      - name: Lint
        run: ruff check app/
      - name: Type check
        run: mypy app/ --ignore-missing-imports
      - name: Test
        run: |
          pytest tests/unit/ -v \
            --ignore=tests/unit/test_orchestrator_flow.py \
            --ignore=tests/unit/test_orchestrator_halt.py \
            --ignore=tests/unit/test_orchestrator_halt_main.py
      - name: Coverage
        run: |
          pytest tests/unit/ --cov=app --cov-report=term-missing \
            --ignore=tests/unit/test_orchestrator_flow.py \
            --ignore=tests/unit/test_orchestrator_halt.py \
            --ignore=tests/unit/test_orchestrator_halt_main.py
