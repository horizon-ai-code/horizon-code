name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-cov pytest-asyncio httpx pynvml
          pip install fastapi uvicorn pydantic peewee pyyaml javalang lizard websockets
      - name: Lint
        run: ruff check app/
      - name: Type check
        run: mypy app/ --ignore-missing-imports
      - name: Test
        run: >-
          pytest tests/unit/ -v --tb=short
          -k "not test_performance_edge and not test_performance_tracker and not test_halt_cancels_active_task"
